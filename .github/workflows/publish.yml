# .github/workflows/publish.yml

name: Publish to PyPI and GitHub Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  bump-version-and-publish:
    runs-on: ubuntu-latest

    steps:
      ### Step 1: Checkout Repository ###
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tagging

      ### Step 1.1: Prevent Infinite Loop ###
      - name: Check Committer
        if: github.actor == 'github-actions[bot]'
        run: |
          echo "Commit made by GitHub Actions. Exiting workflow."
          exit 0

      ### Step 2: Set Up Node.js and Build JS ###
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: cd js && npm ci

      - name: Build tukuy.js
        run: cd js && npm run build

      ### Step 3: Bump Version and Push Tag ###
      - name: Bump Version and Push Tag
        id: bump_version
        uses: mathieudutour/github-tag-action@v6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch    # Options: patch, minor, major
          tag_prefix: 'v'         # Prefix for tags (e.g., 'v1.0.0')
          skip_ci: true           # Prevent triggering workflows on tag push

      ### Step 3: Update VERSION and pyproject.toml ###
      - name: Update Version Files
        run: |
          NEW_VERSION=${{ steps.bump_version.outputs.new_version }}
          echo "${NEW_VERSION}" > VERSION
          sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml
          git add -f js/dist/
          git commit -m "🔄 Version to v${NEW_VERSION} [skip ci]" || true
          git push origin main || true

      ### Step 6: Fetch Latest Pull Request Info ###
      - name: Fetch Latest Pull Request Info
        id: fetch_pr
        uses: actions/github-script@v6
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              head: 'dev',
              sort: 'updated',
              direction: 'desc',
              per_page: 1
            });

            if (prs.data.length > 0) {
              const pr = prs.data[0];
              const prTitle = pr.title;
              const prBody = pr.body || 'No description provided';
              const prNumber = pr.number;
              const prUrl = pr.html_url;
              const prAuthor = pr.user.login;

              const formattedBody = prBody.replace(/\r\n/g, '\n');

              const releaseInfo = {
                title: prTitle,
                body: formattedBody,
                number: prNumber,
                url: prUrl,
                author: prAuthor
              };

              console.log('Latest PR Info:', releaseInfo);
              return releaseInfo;
            } else {
              console.log('No recent PRs from dev to main found');
              return null;
            }

      ### Step 7: Create GitHub Release ###
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          release_name: v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Changes
            ${{ steps.fetch_pr.outputs.result != 'null' && fromJSON(steps.fetch_pr.outputs.result).body || 'Version update' }}

            ## Details
            - Version: v${{ steps.bump_version.outputs.new_version }}
            ${{ steps.fetch_pr.outputs.result != 'null' && format('- PR: #{0} by @{1}', fromJSON(steps.fetch_pr.outputs.result).number, fromJSON(steps.fetch_pr.outputs.result).author) || '' }}
            ${{ steps.fetch_pr.outputs.result != 'null' && format('- PR URL: {0}', fromJSON(steps.fetch_pr.outputs.result).url) || '' }}
          draft: false
          prerelease: false

      ### Step 7: Set Up Python ###
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'  # Specify your Python version

      ### Step 8: Cache pip ###
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      ### Step 9: Install Build Dependencies ###
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      ### Step 10: Build the Package ###
      - name: Build Package
        run: |
          python -m build

      ### Step 11: Publish to PyPI ###
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload dist/*
